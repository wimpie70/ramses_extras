name: Tests

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write

on:
  push:
    branches: [main, master, develop, 'feature/*', 'fix/*']
    paths:
      [
        '.github/workflows/tests.yml',
        'requirements_dev.txt',
        'custom_components/**.py',
        'tests/**',
        'tools/**',
        'pyproject.toml',
      ]
  pull_request:
    branches: [main, master, develop]
    paths:
      [
        '.github/workflows/tests.yml',
        'requirements_dev.txt',
        'custom_components/**.py',
        'tests/**',
        'tools/**',
        'pyproject.toml',
      ]
  schedule:
    - cron: '0 18 * * 5'
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      - name: Run tests
        env:
          PYTEST_ADDOPTS: ''
        run: |
          python -m pytest -o addopts="--color=yes" tests/ --cov=custom_components/ramses_extras --cov-report=xml:coverage.xml --cov-fail-under=40 -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Run mypy
        run: |
          mypy custom_components/ tests/ --config-file config/mypy.ini || echo "mypy failed but continuing"
        continue-on-error: true

  lint:
    name: lint (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: config/package-lock.json

      - name: Install Node.js dependencies
        run: |
          cd config && npm ci

      - name: Run prek
        working-directory: config
        run: |
          npm run lint && npm run format:check

  type:
    name: type (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests

      - name: Run mypy
        run: |
          mypy custom_components/ tests/ --config-file config/mypy.ini || echo "mypy failed but continuing"
