set_fan_speed_mode:
  name: Set Fan Speed Mode
  description: Set the fan speed mode for a Ramses device (requires ramses_cc integration).
  target:
    entity: {}
  fields:
    device_id:
      name: Device ID
      description: The Ramses device ID (e.g., "32:153289").
      required: true
      example: "32:153289"
      selector:
        text:
    mode:
      name: Mode
      description: The fan speed mode to set.
      required: true
      example: "auto"
      selector:
        select:
          options:
            - "low"
            - "medium"
            - "high"
            - "auto"
            - "away"
            - "boost"
    duration:
      name: Duration
      description: How long to maintain this mode in minutes (optional, max 1440 minutes/24 hours).
      required: false
      example: 60
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: minutes
    reason:
      name: Reason
      description: Reason for the manual override (optional, for logging purposes).
      required: false
      example: "High humidity detected"
      selector:
        text:

update_fan_params:
  name: Update Fan Parameters
  description: Request a full refresh of all 2411 parameters from the device (sequential RQ sequence).
  fields:
    device_id:
      name: Device ID
      description: The Ramses device ID (e.g., "32:153289").
      required: true
      example: "32:153289"
      selector:
        text:
    from_id:
      name: From ID
      description: Optional source device ID (e.g., a bound remote).
      required: false
      selector:
        text:

set_fan_parameter:
  name: Set Fan Parameter
  description: Set a specific 2411 parameter on a fan device.
  fields:
    device_id:
      name: Device ID
      description: The Ramses device ID (e.g., "32:153289").
      required: true
      example: "32:153289"
      selector:
        text:
    param_id:
      name: Parameter ID
      description: The 2-digit hex ID of the parameter.
      required: true
      example: "31"
      selector:
        text:
    value:
      name: Value
      description: The value to set for the parameter.
      required: true
      example: "5"
      selector:
        text:
    from_id:
      name: From ID
      description: Optional source device ID (e.g., a bound remote).
      required: false
      selector:
        text:

get_queue_statistics:
  name: Get Queue Statistics
  description: Refresh the RAMSES command queue statistics in the integration data.
  fields: {}

enable_co2_control:
  name: Enable CO2 Control
  description: Enable CO2-based ventilation control for a device.
  fields:
    device_id:
      name: Device ID
      description: The Ramses device ID (e.g., "32:153289").
      required: true
      example: "32:153289"
      selector:
        text:

disable_co2_control:
  name: Disable CO2 Control
  description: Disable CO2-based ventilation control for a device.
  fields:
    device_id:
      name: Device ID
      description: The Ramses device ID (e.g., "32:153289").
      required: true
      example: "32:153289"
      selector:
        text:

set_zone_threshold:
  name: Set Zone CO2 Threshold
  description: Set CO2 threshold for a specific zone.
  fields:
    device_id:
      name: Device ID
      description: The Ramses device ID (e.g., "32:153289").
      required: true
      example: "32:153289"
      selector:
        text:
    zone_id:
      name: Zone ID
      description: The zone identifier.
      required: true
      example: "zone_1"
      selector:
        text:
    threshold:
      name: CO2 Threshold
      description: CO2 threshold in ppm.
      required: true
      example: 1000
      selector:
        number:
          min: 400
          max: 2000
          step: 50
          unit_of_measurement: ppm

trigger_co2_boost:
  name: Trigger CO2 Boost
  description: Manually trigger CO2-based boost mode.
  fields:
    device_id:
      name: Device ID
      description: The Ramses device ID (e.g., "32:153289").
      required: true
      example: "32:153289"
      selector:
        text:
    duration_minutes:
      name: Duration
      description: Duration in minutes.
      required: false
      default: 30
      example: 30
      selector:
        number:
          min: 5
          max: 120
          step: 5
          unit_of_measurement: minutes
